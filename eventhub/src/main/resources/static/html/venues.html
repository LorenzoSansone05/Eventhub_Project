<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>EventHub - Gestione Location</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/venues.css">
  </head>
  <body>
    <nav class="navbar">
      <ul class="nav-links">
        <li><a href="index.html">🏠 EventHub</a></li>
        <li><a href="events.html">Eventi</a></li>
        <li class="btn-login"><a href="login.html">Accedi</a></li>
      </ul>
    </nav>
    <div class="flex-container">
      <div class="admin-alert">
        <span>Modalità Amministratore:</span> Visualizzazione completa di
        tutte le sedi salvate.
      </div>

      <div id="venues-container">
        <div class="venue-card">
          <span class="venue-id-badge">ID: 14</span>

          <h3>Stadium Olimpico</h3>

          <div class="venue-details">
            <div class="detail-item"><span>Città :</span> Roma</div>
            <div class="detail-item">
              <span>Capienza :</span> 70.000 persone
            </div>
            <div class="detail-item">
              <span>Indirizzo :</span> Viale dei Gladiatori 2, 00135
            </div>
          </div>

          <hr />
          <div class="admin-actions">
            <button class="btn-edit">Modifica Location</button>
            <button class="btn-delete">Elimina</button>
          </div>
        </div>
      </div>
    </div>
    <!-- <script src="../js/venues.js"></script> -->
    <script src="../js/nav.js"></script>
  </body>
</html>
