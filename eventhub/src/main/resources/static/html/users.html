<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>EventHub - Gestione Utenti</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/users.css">
</head>
<body>

  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html">🏠 EventHub</a></li>
      <li><a href="events.html">Eventi</a></li>
      <li class="btn-login"><a href="login.html">Accedi</a></li>
    </ul>
  </nav>

  <div class="flex-container">
    <div class="admin-alert">
      <strong>Modalità Amministratore:</strong> Visualizzazione completa di tutti gli utenti registrati.
    </div>

    <div id="users-container">
      
      <div class="user-card" id="user-card-14">
        <span class="user-id-badge">ID: 14</span>
        <h3>mario.rossi@gmail.com</h3>
        
        <div class="user-details">
          <div class="detail-item"><span>Ruolo Attuale:</span> ROLE_USER</div>
          <div class="detail-item"><span>Stato Account:</span> 🟢 Attivo</div>
          
          <!-- Blocco opzionale di modifica -->
          <div class="detail-item edit-role-box" id="edit-role-box-14">
            <span>Nuovo Ruolo:</span>
            <select class="role-select" id="select-role-14">
              <option value="ROLE_USER" selected>USER</option>
              <option value="ROLE_ORGANIZER">ORGANIZER</option>
            </select>
            <button class="btn-edit-save btn-edit">Salva</button>
            <button class="btn-edit-cancel btn-delete">Annulla</button>
          </div>

        </div>
        
        <hr />
        <div class="admin-actions">
          <button class="btn-toggle-edit btn-edit">Modifica Ruolo</button>
          <button class="btn-user-ban btn-ban">Banna</button>
          <button class="btn-user-delete btn-delete">Elimina</button>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/users.js"></script>
  <script src="../js/nav.js"></script>
</body>
</html>
