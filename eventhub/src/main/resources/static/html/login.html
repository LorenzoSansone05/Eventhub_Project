<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub - Accedi</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css"/>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-header">
        <h2>Accedi</h2>
      </div>

      <form action="/api/auth/login" method="POST" id="login-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Inserisci la tua email"
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="Inserisci la tua password"
          />
        </div>

        <div id="error-message" style="color: red; margin-bottom: 15px; font-size: 14px;"></div>

        <button type="submit" class="btn-submit">Accedi</button>
      </form>

      <div class="auth-footer">
        <p>Non hai un account? <a href="signup.html">Registrati qui</a></p>
      </div>
    </div>

    <script src="../js/login.js"></script>
  </body>
</html>
