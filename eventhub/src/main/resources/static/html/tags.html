<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>EventHub - Gestione Tag (Admin)</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/tags.css">
</head>
<body>

  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html">🏠 EventHub</a></li>
      <li><a href="events.html">Eventi</a></li>
      <li class="btn-login"><a href="login.html">Accedi</a></li>
    </ul>
  </nav>

  <div class="flex-container">
    <div class="admin-alert">
      <strong>Modalità Amministratore:</strong> Configurazione, modifica e inserimento dei tag globali utilizzabili dagli organizer per i loro eventi.
    </div>

    <div class="add-tag-container">
      <h3>Crea un nuovo Tag</h3>
      <div class="add-tag-form">
        <input type="text" id="new-tag-name" placeholder="Es. Concerti, Tech, Sport..." class="tag-input">
        <button class="btn-add">Aggiungi Tag</button>
      </div>
    </div>

    <div id="tags-container">
      
      <div class="tag-card" id="tag-card-1">
        <span class="tag-id-badge">ID: 1</span>
        <h3>#Musica</h3>
        
        <div class="tag-details">
          <div class="detail-item edit-tag-box" id="edit-tag-box-1">
            <span>Nuovo Nome:</span>
            <input type="text" class="tag-input-edit" id="input-tag-1" value="Musica">
            <button class="btn-edit-save btn-edit">Salva</button>
            <button class="btn-edit-cancel btn-delete">Annulla</button>
          </div>
        </div>
        
        <hr />
        <div class="admin-actions">
          <button class="btn-toggle-edit btn-edit">Modifica Nome</button>
          <button class="btn-tag-delete btn-delete">Elimina</button>
        </div>
      </div>

      <div class="tag-card" id="tag-card-2">
        <span class="tag-id-badge">ID: 2</span>
        <h3>#Conferenze</h3>
        
        <div class="tag-details">
            <!-- Blocco opzionale di modifica -->
          <div class="detail-item edit-tag-box" id="edit-tag-box-2">
            <span>Nuovo Nome:</span>
            <input type="text" class="tag-input-edit" id="input-tag-2" value="Conferenze">
            <button class="btn-edit-save btn-edit">Salva</button>
            <button class="btn-edit-cancel btn-delete">Annulla</button>
          </div>

        </div>
        
        <hr />
        <div class="admin-actions">
          <button class="btn-toggle-edit btn-edit">Modifica Nome</button>
          <button class="btn-tag-delete btn-delete">Elimina</button>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/nav.js"></script>
  <script src="../js/tags.js"></script>
</body>
</html>
